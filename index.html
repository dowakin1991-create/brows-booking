<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LYANA ZAHRAI | Запис</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Преміальний чорно-білий дизайн з оптимізацією під 120Hz */
        :root { --bg-color: #ffffff; --text-color: #111111; --border-color: #e5e5e5; --accent-color: #000000; --hover-bg: #f9f9f9; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        .booking-container { background-color: var(--bg-color); padding: 40px; border-radius: 0px; /* Гострі кути для строгості */ border: 1px solid var(--border-color); width: 100%; max-width: 420px; text-align: center; }
        .logo-container { margin-bottom: 30px; }
        .logo { max-width: 120px; border-radius: 50%; }
        h2 { font-weight: 600; font-size: 22px; margin-bottom: 25px; letter-spacing: -0.5px; text-transform: uppercase; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 13px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select { width: 100%; padding: 14px; border: 1px solid var(--border-color); background-color: var(--bg-color); color: var(--text-color); box-sizing: border-box; font-size: 15px; font-family: 'Inter', sans-serif; transition: border-color 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94); /* Плавність 120Hz */ will-change: border-color; }
        input:focus, select:focus { border-color: var(--accent-color); outline: none; }
        button { width: 100%; padding: 16px; background-color: var(--accent-color); color: #ffffff; border: none; font-size: 15px; font-weight: 600; font-family: 'Inter', sans-serif; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; margin-top: 15px; transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94), background-color 0.2s; will-change: transform; }
        button:hover { background-color: #333333; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        .success-message { display: none; text-align: center; color: var(--accent-color); font-weight: 500; padding: 30px 0; font-size: 15px; line-height: 1.5; }
        option:disabled { color: #999; }
        /* Анімація завантаження */
        .loader { display: none; margin-top: 15px; font-size: 13px; color: #666; }
    </style>
</head>
<body>

    <div class="booking-container">
        <div class="logo-container">
            <img src="IMG_9581.png" alt="LYANA ZAHRAI" class="logo">
        </div>
        <h2>Оформлення запису</h2>
        
        <form id="bookingForm">
            <div class="form-group">
                <label for="name">Ім'я та прізвище</label>
                <input type="text" id="name" placeholder="Введіть ваше ім'я" required>
            </div>
            <div class="form-group">
                <label for="phone">Контактний номер</label>
                <input type="tel" id="phone" placeholder="+38 (000) 000-00-00" required>
            </div>
            <div class="form-group">
                <label for="service">Послуга</label>
                <select id="service" required>
                    <option value="" disabled selected>Завантаження послуг...</option>
                </select>
            </div>
            <div class="form-group">
                <label for="date">Дата</label>
                <input type="date" id="date" required>
            </div>
            <div class="form-group">
                <label for="time">Час</label>
                <select id="time" required disabled>
                    <option value="" disabled selected>Спочатку оберіть дату</option>
                </select>
            </div>
            <button type="submit" id="submitBtn">Надіслати запит</button>
            <div class="loader" id="loader">Обробка запиту...</div>
        </form>
        <div id="successMessage" class="success-message">
            Ваш запит надіслано.<br><br>Адміністратор перевірить вільні години та підтвердить запис найближчим часом.
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6MUwETUwJzJlp5YEH4fMR_GmDe5GFhoM",
            authDomain: "brows-bookin.firebaseapp.com",
            projectId: "brows-bookin",
            storageBucket: "brows-bookin.firebasestorage.app",
            messagingSenderId: "445308062920",
            appId: "1:445308062920:web:05728753f8391feeae69fd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // НАЛАШТУВАННЯ TELEGRAM БОТА
        const TELEGRAM_BOT_TOKEN = 'ВАШ_ТОКЕН_БОТА'; // Замініть на токен
        const TELEGRAM_CHAT_ID = 'ВАШ_ID_ЧАТУ'; // Замініть на ваш ID

        const serviceSelect = document.getElementById('service');
        const dateInput = document.getElementById('date');
        const timeSelect = document.getElementById('time');

        // Завантаження послуг з бази
        async function loadServices() {
            const q = query(collection(db, "services"));
            const querySnapshot = await getDocs(q);
            serviceSelect.innerHTML = '<option value="" disabled selected>Оберіть послугу</option>';
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                serviceSelect.innerHTML += `<option value="${data.name}">${data.name} — ${data.price} грн</option>`;
            });
            if(querySnapshot.empty) {
                serviceSelect.innerHTML = '<option value="" disabled selected>Немає доступних послуг</option>';
            }
        }
        loadServices();

        // Завантаження робочих годин з бази
        let workingHours = [];
        async function loadSettings() {
            const q = query(collection(db, "settings"));
            const querySnapshot = await getDocs(q);
            querySnapshot.forEach((doc) => {
                if(doc.id === 'hours') workingHours = doc.data().list || [];
            });
        }
        loadSettings();

        // Логіка перевірки годин
        dateInput.addEventListener('change', async function() {
            const selectedDate = this.value;
            timeSelect.disabled = true;
            timeSelect.innerHTML = '<option value="" disabled selected>Перевірка вільних годин...</option>';

            if (workingHours.length === 0) {
                timeSelect.innerHTML = '<option value="" disabled selected>Графік не налаштовано</option>';
                return;
            }

            workingHours.forEach(hour => {
                timeSelect.innerHTML += `<option value="${hour}">${hour}</option>`;
            });

            const q = query(collection(db, "bookings"), where("date", "==", selectedDate));
            const querySnapshot = await getDocs(q);
            
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                if(data.status !== 'cancelled') { // Блокуємо лише підтверджені або в очікуванні
                    for (let i = 1; i < timeSelect.options.length; i++) {
                        if (timeSelect.options[i].value === data.time) {
                            timeSelect.options[i].disabled = true;
                            timeSelect.options[i].text += " (Зайнято)";
                        }
                    }
                }
            });

            timeSelect.disabled = false;
            timeSelect.options[0].text = "Оберіть вільний час";
        });

        // Відправка форми
        document.getElementById('bookingForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            
            const bookingData = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                service: document.getElementById('service').value,
                date: document.getElementById('date').value,
                time: document.getElementById('time').value,
                status: 'pending', // Статус "В очікуванні"
                timestamp: new Date()
            };

            try {
                await addDoc(collection(db, "bookings"), bookingData);
                
                // Відправка в Telegram
                if(TELEGRAM_BOT_TOKEN !== 'ВАШ_ТОКЕН_БОТА') {
                    const msg = `🔔 *НОВИЙ ЗАПИТ НА ЗАПИС*\n\n👤 Клієнт: ${bookingData.name}\n📞 Тел: ${bookingData.phone}\n✂️ Послуга: ${bookingData.service}\n📅 Дата: ${bookingData.date}\n⏰ Час: ${bookingData.time}\n\nЗайдіть в панель адміністратора, щоб підтвердити або скасувати.`;
                    fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: msg, parse_mode: 'Markdown' })
                    });
                }

                document.getElementById('bookingForm').style.display = 'none';
                document.getElementById('successMessage').style.display = 'block';
            } catch (e) {
                alert("Виникла помилка. Спробуйте пізніше.");
                document.getElementById('submitBtn').style.display = 'block';
                document.getElementById('loader').style.display = 'none';
            }
        });
    </script>
</body>
</html>
